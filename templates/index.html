<!DOCTYPE html>
<html>
<head>
    <title>dAItamAIt AI</title>

    <style>
        body{
            background:#111827;
            color:white;
            font-family:Arial;
            text-align:center;
        }

	.card{
    	    background:#1f2937;
    	    width:700px;
    	    margin:auto;
    	    margin-top:20px;
    	    padding:25px;
    	    border-radius:15px;
            box-shadow:0 0 20px rgba(0,255,120,.2);
	}
        input{
            padding:10px;
            font-size:18px;
            width:150px;
        }

        button{
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
        }

        h1{
            color:#22c55e;
        }

        .metric{
            font-size:22px;
            padding:8px;
        }
    </style>

</head>

<body>

<div class="card">

<h1>dAItamAIt AI</h1>

<input id="ticker" value="AAPL">

<button onclick="analyze()">
Analyze
</button>

<div id="results"></div>

</div>

<script>

async function analyze(){

    let ticker = document.getElementById("ticker").value;

    let response = await fetch("/analyze?ticker=" + ticker);

    let data = await response.json();

    document.getElementById("results").innerHTML = `

        <h2>${data.signal}</h2>

        <div class="card">
            <h3>📈 Market Overview</h3>

            <div class="metric"><b>Price:</b> $${data.price}</div>
            <div class="metric"><b>Trend:</b> ${data.trend}</div>
            <div class="metric"><b>Confidence:</b> ${data.confidence}</div>
            <div class="metric"><b>Trade Score:</b> ${data.trade_score}</div>
        </div>

        <br>

        <div class="card">
            <h3>🎯 Trade Plan</h3>

            <div class="metric">📍 Entry: $${data.entry_price}</div>
            <div class="metric">🛑 Stop: $${data.stop_loss}</div>
            <div class="metric">🎯 Target: $${data.take_profit}</div>
            <div class="metric">⚖ Risk / Reward: ${data.risk_reward}</div>
        </div>

        <br>

        <div class="card">
            <h3>🤖 AI Analysis</h3>

            <p>${data.reason}</p>
        </div>

    `;

}

</script>

</body>
</html>
